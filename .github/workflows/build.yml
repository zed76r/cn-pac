name: 构建并发布 PAC 文件

on:
  # 手动触发工作流
  workflow_dispatch:
  # 定时任务，每周一 UTC 时间 0:00 运行（相当于北京时间 8:00）
  schedule:
    - cron: '0 0 * * 1'
  # 当推送到 main 分支时触发
  push:
    branches:
      - main

# 设置必要的权限
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: 运行 PAC 生成脚本并捕获统计数据
        id: generate_pac
        run: |
          # MetaCubeX 列表
          python3 generate_pac.py --check-duplicates --source metacubex --output proxy-metacubex.pac | tee pac_metacubex.log

          # ACL4SSR 列表
          python3 generate_pac.py --check-duplicates --source acl4ssr --output proxy-acl4ssr.pac | tee pac_acl4ssr.log

          # 从 MetaCubeX 日志提取统计数据
          LOCALAREA_COUNT=$(grep -o "局域网域名数量: [0-9]*" pac_metacubex.log | awk '{print $2}')
          METACUBEX_COUNT=$(grep -o "中国域名数量: [0-9]*" pac_metacubex.log | awk '{print $2}')
          DIRECT_COUNT=$(grep -o "^自定义直连域名数量: [0-9]*" pac_metacubex.log | awk '{print $2}')
          TOTAL_DIRECT_METACUBEX=$(grep -o "直连域名总数: [0-9]*" pac_metacubex.log | awk '{print $2}')
          PROXY_COUNT=$(grep -o "代理域名总数: [0-9]*" pac_metacubex.log | awk '{print $2}')
          REMOVED_COUNT=$(grep -o "已自动移除重复域名数量: [0-9]*" pac_metacubex.log | awk '{print $2}')

          # 从 ACL4SSR 日志提取中国域名数量
          ACL4SSR_COUNT=$(grep -o "中国域名数量: [0-9]*" pac_acl4ssr.log | awk '{print $2}')
          TOTAL_DIRECT_ACL4SSR=$(grep -o "直连域名总数: [0-9]*" pac_acl4ssr.log | awk '{print $2}')

          # 输出到环境变量
          echo "LOCALAREA_COUNT=${LOCALAREA_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "METACUBEX_COUNT=${METACUBEX_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "ACL4SSR_COUNT=${ACL4SSR_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "DIRECT_COUNT=${DIRECT_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "TOTAL_DIRECT_METACUBEX=${TOTAL_DIRECT_METACUBEX:-0}" >> $GITHUB_OUTPUT
          echo "TOTAL_DIRECT_ACL4SSR=${TOTAL_DIRECT_ACL4SSR:-0}" >> $GITHUB_OUTPUT
          echo "PROXY_COUNT=${PROXY_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "REMOVED_COUNT=${REMOVED_COUNT:-0}" >> $GITHUB_OUTPUT
        
      - name: 获取当前日期
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 检查现有 Release 并生成 Tag 名称
        id: check_releases
        run: |
          # 获取基本日期标签
          BASE_TAG=${{ steps.date.outputs.DATE }}
          
          # 检查是否已存在同名标签
          TAG_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${BASE_TAG}")
          
          # 如果标签不存在，直接使用基本日期作为标签
          if [ "$TAG_EXISTS" != "200" ]; then
            echo "TAG=${BASE_TAG}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=${BASE_TAG}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 如果标签已存在，查找所有相关标签并确定下一个序号
          TAGS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags" | \
            grep -o "\"ref\": \"refs/tags/${BASE_TAG}[-]*[0-9]*\"" | \
            grep -o "${BASE_TAG}[-]*[0-9]*")
          
          # 查找最大序号
          MAX_NUM=0
          for TAG in $TAGS; do
            if [[ "$TAG" == "$BASE_TAG" ]]; then
              # 基本标签存在，下一个至少是 -1
              if [ "$MAX_NUM" -eq 0 ]; then
                MAX_NUM=1
              fi
            elif [[ "$TAG" =~ ${BASE_TAG}-([0-9]+)$ ]]; then
              NUM=${BASH_REMATCH[1]}
              if [ "$NUM" -ge "$MAX_NUM" ]; then
                MAX_NUM=$((NUM + 1))
              fi
            fi
          done
          
          # 生成新标签名称
          if [ "$MAX_NUM" -gt 0 ]; then
            NEW_TAG="${BASE_TAG}-${MAX_NUM}"
          else
            NEW_TAG="${BASE_TAG}"
          fi
          
          echo "TAG=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "将使用标签: ${NEW_TAG}"
      
      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.check_releases.outputs.TAG }}
          name: ${{ steps.check_releases.outputs.RELEASE_NAME }}
          body: |
            PAC 文件自动更新 - ${{ steps.check_releases.outputs.TAG }}

            ## 文件说明
            - `proxy-metacubex.pac` — 基于 MetaCubeX geolocation-cn 列表（较大）
            - `proxy-acl4ssr.pac` — 基于 ACL4SSR ChinaDomain 列表（较小）

            ## 更新统计
            - 局域网域名数量: ${{ steps.generate_pac.outputs.LOCALAREA_COUNT }}
            - MetaCubeX 中国域名数量: ${{ steps.generate_pac.outputs.METACUBEX_COUNT }}（直连总计 ${{ steps.generate_pac.outputs.TOTAL_DIRECT_METACUBEX }}）
            - ACL4SSR 中国域名数量: ${{ steps.generate_pac.outputs.ACL4SSR_COUNT }}（直连总计 ${{ steps.generate_pac.outputs.TOTAL_DIRECT_ACL4SSR }}）
            - 自定义直连域名数量: ${{ steps.generate_pac.outputs.DIRECT_COUNT }}
            - 代理域名总数: ${{ steps.generate_pac.outputs.PROXY_COUNT }}
            ${{ steps.generate_pac.outputs.REMOVED_COUNT != '0' && format('- 已移除重复域名: {0}', steps.generate_pac.outputs.REMOVED_COUNT) || '' }}
          files: |
            output/proxy-metacubex.pac
            output/proxy-acl4ssr.pac
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}